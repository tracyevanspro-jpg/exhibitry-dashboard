<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exhibitry — Project Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    /* Simple Auth Overlay */
    #auth-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      z-index: 10000; transition: opacity 0.3s ease;
    }
    .auth-card {
      background: var(--card-bg); padding: 2.5rem; border-radius: 24px;
      border: 0.5px solid var(--border); width: 100%; max-width: 340px;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }
    .auth-input {
      width: 100%; padding: 14px; border-radius: 12px; border: 0.5px solid var(--border);
      background: var(--bg); color: var(--text); margin: 1.5rem 0; font-size: 18px;
      text-align: center; letter-spacing: 0.3em; outline: none; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--blue-fg); }
    #dashboard-content { opacity: 0; transition: opacity 0.8s ease; }
    #dashboard-content.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="auth-card">
      <div style="font-size: 32px; margin-bottom: 1rem;">🔐</div>
      <div style="font-size: 16px; font-weight: 600; color: var(--text);">Exhibitry Brain</div>
      <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Enter Secure Access Key</div>
      <input type="password" id="auth-password" class="auth-input" placeholder="••••" autofocus>
      <div id="auth-error" style="color: var(--red-fg); font-size: 11px; min-height: 14px;"></div>
    </div>
  </div>

  <div id="dashboard-content">
    <nav>
      <div class="header-flex">
        <div>
          <h1>Exhibitry — Project Dashboard</h1>
          <p class="subtitle" id="last-updated">Synchronizing with Brain...</p>
        </div>
        <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
      </div>
    </nav>

    <div id="dashboard">
      <div class="loading">Connecting...</div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
